name: Android CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle 8.5 and build (no wrapper)
        shell: bash
        run: |
          set -e
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle.zip
          ./gradle-8.5/bin/gradle --version
          # Build Debug APK
          ./gradle-8.5/bin/gradle -Dorg.gradle.jvmargs="-Xmx2g" assembleDebug
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk artifacts/ || echo "No APK yet"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: artifacts
