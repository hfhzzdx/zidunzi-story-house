name: Android CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('gradlew') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@v3

      - name: Verify Gradle Wrapper Version (8.5)
        shell: bash
        run: |
          set -e
          chmod +x gradlew || true
          ./gradlew --version | tee gradle_ver.txt
          if ! grep -qE '^Gradle 8\.5$' gradle_ver.txt; then
            echo 'Expected Gradle 8.5. Please set gradle/wrapper/gradle-wrapper.properties distributionUrl to gradle-8.5-all.zip.' >&2
            exit 1
          fi

      - name: Build with Gradle (Release)
        uses: gradle/gradle-build-action@v3
        with:
          arguments: assembleRelease

      - name: Sign APK (optional)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
