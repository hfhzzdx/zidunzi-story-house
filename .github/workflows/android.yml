name: Android CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Build (assembleDebug if gradlew exists; otherwise skip)
        shell: bash
        run: |
          set -e
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew --version
            ./gradlew assembleDebug
            mkdir -p artifacts
            cp app/build/outputs/apk/debug/*.apk artifacts/ || true
          else
            echo "gradlew not found; skipping build. Submit Android project with Gradle wrapper (8.5) to enable CI."
            mkdir -p artifacts
            echo "No gradlew; build skipped." > artifacts/README.txt
          fi

      - name: Upload Artifact (if any)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts
